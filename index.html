<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoLayer Text Overlay Studio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700&family=Roboto:wght@400;700&family=VT323&family=Press+Start+2P&family=Silkscreen&family=Courier+Prime:wght@400;700&family=Lato:wght@400;700&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Merriweather:wght@400;700&family=Permanent+Marker&family=Lobster&display=swap" rel="stylesheet">
</head>
<body>
    <div class="retro-texture"></div>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="logo">
                <h1>🌌 NanoLayer</h1>
                <p>Text Overlay Studio</p>
            </div>

            <div class="control-group">
                <label>Upload Image</label>
                <input type="file" id="image-upload" accept="image/*" style="font-size: 13px; color: var(--text-primary);" />
            </div>


            <div class="control-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                    <label for="ai-prompt" style="color: var(--accent); margin-bottom: 0;">AI Prompt Generator</label>
                    <span id="api-status-badge" style="font-size: 11px; padding: 2px 4px; border: 1px solid #000; font-family: 'Silkscreen', monospace; background: #fff;">Checking...</span>
                </div>
                <textarea id="ai-prompt" rows="2" placeholder="e.g. Write a poetic quote about mountains..."></textarea>
                <button id="generate-ai-btn" class="secondary-btn" style="width: 100%; margin-top: 8px; padding: 8px; background-color: #e5e5e5; border: 1px solid #000; font-family: 'Silkscreen', monospace; cursor:pointer;">Generate Text ✨</button>
            </div>

            <div class="control-group">
                <label for="overlay-text">Final Overlay Text</label>
                <textarea id="overlay-text" rows="3" placeholder="Enter text...">Layering text!</textarea>
            </div>

            <div class="control-row">
                <div class="control-group half">
                    <label for="font-family">Font</label>
                    <select id="font-family" style="width: 100%; border-radius: 0px; padding: 10px; background-color: #ffffff; color: #000000; border: 1px solid var(--border); font-family: inherit;">
                        <option value="Inter">Inter</option>
                        <option value="Roboto">Roboto</option>
                        <option value="Lato">Lato</option>
                        <option value="Open Sans">Open Sans</option>
                        <option value="Oswald">Oswald</option>
                        <option value="Merriweather">Merriweather</option>
                        <option value="Playfair Display">Playfair Display</option>
                        <option value="Montserrat">Montserrat</option>
                        <option value="Lobster">Lobster</option>
                        <option value="Permanent Marker">Permanent Marker</option>
                        <option value="VT323">VT323 (Terminal)</option>
                        <option value="Press Start 2P">Press Start 2P (8-bit)</option>
                        <option value="Silkscreen">Silkscreen (Pixel)</option>
                        <option value="Courier Prime">Courier (Typewriter)</option>
                    </select>
                </div>
                <div class="control-group half">
                    <label for="text-color">Color</label>
                    <input type="color" id="text-color" value="#6366f1" />
                </div>
            </div>

            <div class="control-row">
                <div class="control-group half">
                    <label for="pos-x">X Position: <span id="x-val">50</span>%</label>
                    <input type="range" id="pos-x" min="0" max="100" value="50" />
                </div>
                <div class="control-group half">
                    <label for="pos-y">Y Position: <span id="y-val">50</span>%</label>
                    <input type="range" id="pos-y" min="0" max="100" value="50" />
                </div>
            </div>

            <div class="control-row">
                <div class="control-group half" style="width: 60%;">
                    <label for="font-size">Font Size: <span id="size-val">80</span>px</label>
                    <input type="range" id="font-size" min="12" max="200" value="80" style="width: 100%;" />
                </div>
                <div class="control-group half" style="width: 40%; display: flex; align-items: center; justify-content: center; margin-top: 15px;">
                    <label for="box-text" style="display:flex; align-items:center; cursor:pointer; font-weight: 600;">
                        <input type="checkbox" id="box-text" style="width:20px; height:20px; margin-right: 10px; cursor:pointer; appearance: auto;" />
                        Box Text
                    </label>
                </div>
            </div>

            <div class="status" id="status-message">Ready to overlay...</div>
            
            <button id="download-btn" class="primary-btn" disabled>Download Image</button>
        </aside>

        <!-- Main Preview Area -->
        <main class="preview-area">
            <div class="canvas-container">
                <div class="loading-overlay" id="loading">
                    <div class="spinner"></div>
                </div>
                <img id="result-image" alt="Overlay Result" />
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
